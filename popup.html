<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; width: 320px; padding: 15px; }
    h3 { margin-top: 0; color: #333; border-bottom: 1px solid #ccc; padding-bottom: 5px; }

    .form-group { margin-bottom: 10px; }
    label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 3px; color: #555; }
    input[type="text"], input[type="password"], select {
      width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;
    }

    .btn-group { display: flex; gap: 5px; margin-top: 15px; }
    button {
      flex: 1; padding: 8px; cursor: pointer; border: none; border-radius: 4px; color: white; font-weight: bold;
    }
    .btn-pages { background-color: #2ecc71; }
    .btn-consoles { background-color: #3498db; }
    .btn-save { background-color: #9b59b6; width: 100%; margin-top: 10px; }
    button:hover { opacity: 0.9; }

    #status { margin-top: 15px; padding: 8px; font-size: 12px; border-radius: 4px; display: none; }
    .status-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .status-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  </style>
</head>
<body>
  <h3>WanderTographer</h3>

  <div class="form-group">
    <label for="platform">Platform</label>
    <select id="platform">
      <option value="github">GitHub</option>
      <option value="codeberg">Codeberg</option>
    </select>
  </div>

  <div class="form-group">
    <label for="accessToken">Access / API Token</label>
    <input type="password" id="accessToken" placeholder="Paste token here">
  </div>

  <div class="form-group">
    <label for="owner">Owner</label>
    <input type="text" id="owner" value="bruff-gay">
  </div>

  <div class="form-group">
    <label for="repo">Repository</label>
    <input type="text" id="repo" value="bruff-gay.github.io">
  </div>

  <div class="form-group">
    <label for="filePath">File Path</label>
    <input type="text" id="filePath" value="wander/wander.js">
  </div>

  <div class="form-group">
    <label for="branch">Branch</label>
    <input type="text" id="branch" value="main">
  </div>

  <button id="saveBtn" class="btn-save">Save Configuration</button>

  <div class="btn-group">
    <button id="addPagesBtn" class="btn-pages">Add to Pages</button>
    <button id="addConsolesBtn" class="btn-consoles">Add to Consoles</button>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
